# =============================================================================
# DALI ServUI – Docker Hub Publish Workflow
# Author: c42u | Co-Author: ClaudeCode | License: GPLv3
#
# Builds the multi-arch container image (amd64 + arm64) and pushes it to
# Docker Hub. Triggered by:
#   - push on main → tag "latest"
#   - push of a tag matching v*.*.* → tag with that version (and "latest")
#
# Required GitHub repository secrets:
#   DOCKERHUB_USERNAME – Docker Hub login (e. g. c42u)
#   DOCKERHUB_TOKEN    – Docker Hub access token (Read & Write & Delete)
# =============================================================================

name: Build & publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/dali-servui
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=DALI ServUI
            org.opencontainers.image.description=Web-based DALI lighting controller with multi-hardware support, REST API, SSE and multi-room dashboard
            org.opencontainers.image.licenses=GPL-3.0-or-later
            org.opencontainers.image.source=https://github.com/c42u/dali-servui

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Docker-Hub-Repo-Description aus README + IMPRESSUM zusammenbauen.
      # Der IMPRESSUM.md-Link im README zeigt auf die separate Datei, die
      # auf Docker Hub nicht existiert – also durch einen Anker ersetzen
      # und das IMPRESSUM-Inhalt am Ende anhängen (analog zum
      # grocylink-Pattern auf Docker Hub).
      - name: Compose Docker Hub description
        if: github.ref == 'refs/heads/main'
        run: |
          {
            sed 's|](IMPRESSUM.md)|](#impressum)|g' README.md
            echo
            echo "---"
            echo
            echo '# Impressum <a name="impressum"></a>'
            echo
            tail -n +2 IMPRESSUM.md
          } > /tmp/dockerhub-description.md
          wc -c /tmp/dockerhub-description.md

      - name: Update Docker Hub description
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/dali-servui
          short-description: "Web-based DALI lighting controller with multi-hardware support, REST API, SSE and multi-room dashboard. Self-hosted."
          readme-filepath: /tmp/dockerhub-description.md
